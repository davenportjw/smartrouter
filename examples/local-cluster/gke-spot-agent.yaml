apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartrouter-agent-gke-spot
  namespace: smartrouter
  labels:
    app: smartrouter-agent-spot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smartrouter-agent-spot
  template:
    metadata:
      labels:
        app: smartrouter-agent-spot
    spec:
      # 1. Target GKE Spot Node Pool specifically for cost efficiency
      nodeSelector:
        cloud.google.com/gke-spot: "true"
      tolerations:
      - key: "cloud.google.com/gke-spot"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
      
      volumes:
      # Shared cache volume for HF model weights to avoid redownloading on preemptions
      - name: model-cache
        persistentVolumeClaim:
          claimName: model-cache-pvc
          
      containers:
      # 2. Core Headless Poller Agent
      - name: poller-agent
        image: gcr.io/my-project/smart-router-k8s-agent:latest
        env:
        - name: ROUTER_URL
          value: "https://gemini-smart-router-backend-txgsracloq-uc.a.run.app"
        - name: CLUSTER_ID
          value: "gke-gpu-spot-pool"
        resources:
          limits:
            cpu: "1"
            memory: 2Gi
          requests:
            cpu: "250m"
            memory: 512Mi

      # 3. High-Performance vLLM Sidecar (OpenAI Compatible API)
      - name: vllm-engine
        image: vllm/vllm-openai:latest
        args: [
          "--model", "google/gemma-2-9b-it",
          "--port", "11434",
          "--max-model-len", "4096"
        ]
        env:
        - name: HUGGING_FACE_HUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-token-secret
              key: token
        ports:
        - containerPort: 11434
        resources:
          limits:
            nvidia.com/gpu: "1" # Allocates the Nvidia L4 GPU (24GB VRAM)
            memory: 24Gi
          requests:
            nvidia.com/gpu: "1"
            memory: 16Gi
        volumeMounts:
        - mountPath: /root/.cache/huggingface
          name: model-cache
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: smartrouter-spot-scaler
  namespace: smartrouter
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: smartrouter-agent-gke-spot
  minReplicaCount: 0  # Scales to absolute zero when idle!
  maxReplicaCount: 8
  cooldownPeriod: 180 # Keep GPU online for 3 mins after queue empties
  triggers:
  - type: prometheus
    metadata:
      serverAddress: http://prometheus-server.monitoring.svc.cluster.local:9090
      metricName: smartrouter_queue_depth
      query: sum(smartrouter_queue_depth{cluster_id="gke-gpu-spot-pool"})
      threshold: '2'  # Spin up 1 GPU Pod per 2 pending queue requests
